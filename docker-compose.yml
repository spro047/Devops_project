services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/inventory.db
    volumes:
      - ./backend/instance:/app/instance

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
