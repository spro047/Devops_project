{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2 style="margin-bottom: 0.5rem; font-size: 1.75rem;">Add New <span style="color: var(--primary);">Product</span></h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Register a new SKU into the system.</p>

    <form method="POST">
        <div class="form-group">
            <label for="sku">SKU (Stock Keeping Unit)</label>
            <input type="text" id="sku" name="sku" placeholder="e.g. PRD-001" required>
        </div>

        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Wireless Mouse" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" placeholder="e.g. Electronics">
            </div>
            <div class="form-group">
                <label for="price">Unit Price ($)</label>
                <input type="number" id="price" name="price" step="0.01" value="0.00">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="quantity">Initial Quantity</label>
                <input type="number" id="quantity" name="quantity" value="0">
            </div>
            <div class="form-group">
                <label for="threshold">Low Stock Threshold</label>
                <input type="number" id="threshold" name="threshold" value="10">
            </div>
        </div>

        <div style="margin-top: 1rem;">
            <button type="submit" class="btn-primary" style="width: 100%;">Create Product</button>
            <a href="{{ url_for('main.list_products') }}" style="display: block; text-align: center; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
